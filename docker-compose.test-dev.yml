
version: "3"

services:
  nginx:
    image: nginx:1.29
    restart: unless-stopped
    container_name: test-prv-nginx
    ports:
      - "0.0.0.0:8080:80"
      - "0.0.0.0:8043:443"
      - "0.0.0.0:8443:9443"
    depends_on:
      - server
    env_file:
      - .docker.nginx.env
    volumes:
      - ./nginx/conf.d/prod.conf:/usr/src/app/nginx/conf.d/default.conf
      - etc-letsencrypt:/etc/letsencrypt/
      - static-volume-test:/usr/src/app/RepackingProject/static
    command: /bin/bash -c "envsubst '$${SERVER_NAME},$${SSL_CERTIFICATE_PATH},$${SSL_CERTIFICATE_KEY_PATH}' < /usr/src/app/nginx/conf.d/default.conf > /etc/nginx/conf.d/default.conf && nginx -g 'daemon off;'"

  server:
    build:
      context: .
      dockerfile: dockerfile/Dockerfile
      target: server
    restart: always
    container_name: test-prv-server
    depends_on:
      - redis
    env_file:
      - .docker.postgres.env
      - .docker.broker.env
      - .docker.test.env
    expose:
      - "8000"
    volumes:
      - recording-files-volume-test:/usr/src/app/RepackingProject/files
      - static-volume-test:/usr/src/app/RepackingProject/static
    command: bash -c '/usr/src/app/venv/bin/gunicorn --timeout 600 --preload --workers 6 --bind 0.0.0.0:8000 RepackingProject.wsgi:application -e WSGI_FULL_INIT=1 -e WSGI_FULL_INIT_CLOSE_CONNECTIONS=1'

  celery-worker-1:
    build:
      context: .
      dockerfile: dockerfile/celery.ffmpeg.Dockerfile
    restart: unless-stopped
    container_name: test-prv-cw1
    command: bash -c '/usr/src/app/venv/bin/celery -A CeleryApp.app worker --loglevel=info -c $${FFMPEG_CELERY_CONCURRENCY} -Q ffmpeg_worker_queue -n ffmpeg-worker'
    depends_on:
      - redis
    env_file:
      - .docker.postgres.env
      - .docker.broker.env
      - .docker.test.env
    volumes:
      - recording-files-volume-test:/usr/src/app/RepackingProject/files

  celery-worker-2:
    build:
      context: .
      dockerfile: dockerfile/Dockerfile
      target: celery
    restart: unless-stopped
    container_name: test-prv-cw2
    command: bash -c '/usr/src/app/venv/bin/celery -A CeleryApp.app worker --beat --loglevel=info -c 4 -Q common_worker_queue -n common-worker'
    depends_on:
      - redis
    env_file:
      - .docker.postgres.env
      - .docker.broker.env
      - .docker.test.env
    volumes:
      - recording-files-volume-test:/usr/src/app/RepackingProject/files

  celery-worker-3:
    build:
      context: .
      dockerfile: dockerfile/Dockerfile
      target: celery
    restart: unless-stopped
    container_name: test-prv-cw3
    command: bash -c '/usr/src/app/venv/bin/celery -A CeleryApp.app worker --loglevel=info -c 1 -Q upload_worker_queue -n upload-worker'
    depends_on:
      - redis
    env_file:
      - .docker.postgres.env
      - .docker.broker.env
      - .docker.test.env
    volumes:
      - recording-files-volume-test:/usr/src/app/RepackingProject/files

  flower:
    image: mher/flower:0.9.7
    restart: unless-stopped
    container_name: test-prv-flower
    command: ["flower", "--port=5555", "--url_prefix=flower"]
    env_file:
      - .docker.flower.env
      - .docker.broker.env
    expose:
      - "5555"
    depends_on:
      - redis

  redis:
    image: redis:8.0.3
    restart: always
    command: redis-server
    expose:
      - "6379"

  postgres:
    image: postgres:17.6
    restart: unless-stopped
    container_name: test-prv-postgres
    expose:
      - "5432"
    env_file:
      - .docker.postgres.env
    volumes:
      - db-volume-test:/var/lib/postgresql/data/

  portainer:
    image: portainer/portainer-ce:2.20.2
    container_name: test-prv-portainer
    restart: always
    expose:
      - "9443"
      - "9000"
      - "8000"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - portainer_data-test:/data
#    environment:
#      - TRUSTED_ORIGINS=127.0.0.1

volumes:
  db-volume-test:
  recording-files-volume-test:
  static-volume-test:
  portainer_data-test:
  etc-letsencrypt: